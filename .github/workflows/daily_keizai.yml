name: Daily Economic Intelligence Master Pipeline

on:
  schedule:
    # 毎日 日本時間 08:30 (UTC 23:30) に実行
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of reports to process'
        required: true
        default: '10'

jobs:
  intelligence:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow pushing updates to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Restore NotebookLM Session
        run: |
          mkdir -p ~/.notebooklm
          echo "${{ secrets.NOTEBOOKLM_STORAGE_STATE }}" > ~/.notebooklm/storage_state.json
          # Ensure the file is not empty to avoid errors
          if [ ! -s ~/.notebooklm/storage_state.json ]; then
            echo "[!] Warning: NOTEBOOKLM_STORAGE_STATE secret is empty or missing! Local testing will work, but CI might need it."
          fi

      - name: Run Master Intelligence Pipeline
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          # Running the consolidated master driver
          python3 unified_pipeline.py ${{ github.event.inputs.limit || 10 }}

      - name: Commit and Push Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [Auto] Update Daily Economic Intelligence - ${{ github.run_id }}"
          file_pattern: "keizai-web/public/reports/ keizai-web/src/data/reports.json"
          branch: main

      - name: Debug Output on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-results-${{ github.run_id }}
          path: |
            *.png
            keizai-web/public/reports/
